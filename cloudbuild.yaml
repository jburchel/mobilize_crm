steps:
# Build the container image
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/mobilize-crm', '.']

# Push the container image to Container Registry
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/mobilize-crm']

# Deploy container image to Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
  - 'run'
  - 'deploy'
  - 'mobilize-crm'
  - '--image'
  - 'gcr.io/$PROJECT_ID/mobilize-crm'
  - '--region'
  - 'us-central1'
  - '--platform'
  - 'managed'
  - '--allow-unauthenticated'
  - '--set-env-vars'
  - 'FLASK_ENV=production,BASE_URL=https://mobilize-crm.org'
  - '--memory'
  - '512Mi'
  id: 'deploy'

# Update domain mapping to ensure it points to the latest revision
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
  - 'beta'
  - 'run'
  - 'domain-mappings'
  - 'create'
  - '--service'
  - 'mobilize-crm'
  - '--domain'
  - 'mobilize-crm.org'
  - '--region'
  - 'us-central1'
  - '--platform'
  - 'managed'
  - '--force'
  id: 'update-domain-mapping'
  waitFor: ['deploy']

# Images to be stored in Container Registry
images:
- 'gcr.io/$PROJECT_ID/mobilize-crm'

timeout: '1600s'

# Add logging options
options:
  logging: CLOUD_LOGGING_ONLY 